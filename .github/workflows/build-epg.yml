name: Build EPG

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "merge.py"
      - ".github/workflows/build-epg.yml"

permissions:
  contents: write

concurrency:
  group: build-epg
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install lxml
        run: pip install lxml

      - name: Run merge
        run: python merge.py

      - name: Show file size
        run: ls -lh combined.xml.gz

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add combined.xml.gz
          if git diff --staged --quiet; then
            echo "No EPG changes. Nothing to commit."
            exit 0
          fi
          git commit -m "EPG refresh $(date -u +'%Y-%m-%d %H:%M UTC')"
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "Push succeeded on attempt $attempt"
              exit 0
            fi
            echo "Push attempt $attempt failed. Rebasing on origin/main and retrying."
            git fetch origin main
            git rebase origin/main || { echo "Rebase failed"; exit 1; }
            sleep 3
          done
          echo "Push still failing after 5 attempts."
          exit 1
